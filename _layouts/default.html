<!DOCTYPE html>
{% assign theme = site.data.themes[site.ui_theme] %}
<html>
  {% include head.html %}
  <body style="background-color:{{theme.background-color}};">
    {% include nav.html %}
    <div class="dumbarton-spacer-sm"></div>
    <div class="container">
      {{ content }}
    </div>
    <div class="dumbarton-spacer"></div>
    {% include footer.html %}
  </body>
</html>

<script type="text/x-mathjax-config">
MathJax.Hub.Config({
  tex2jax: {
    inlineMath: [['$','$'], ['\\(','\\)']],
    processEscapes: true
  }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-AMS-MML_HTMLorMML" type="text/javascript"></script>
